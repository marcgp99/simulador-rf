<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ixotrack RF Simulator | Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { background-color: #0B1120; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        #map { height: 100%; width: 100%; border-radius: 0.75rem; z-index: 1; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .toggle-checkbox:checked { right: 0; border-color: #06b6d4; }
        .toggle-checkbox:checked + .toggle-label { background-color: #06b6d4; }
        .glow-hover:hover { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); }

        /* Efecto de resplandor neón para el marcador naranja */
        .neon-orange-pin {
            filter: drop-shadow(0 0 5px rgba(255, 126, 0, 0.8));
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="demo-banner" class="hidden w-full text-center py-2 text-xs font-semibold tracking-wide shadow-md z-20 relative bg-amber-500/10 text-amber-400 border-b border-amber-500/20 uppercase"></div>

    <header class="bg-[#0B1120]/95 backdrop-blur border-b border-slate-800/80 py-4 px-6 flex items-center justify-between z-10 relative">
        <div class="flex items-center gap-3">
            <svg class="w-7 h-7 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.106-.53-.106a.75.75 0 01-.6-1.07l.6-.8a.75.75 0 011.2 0l.6.8a.75.75 0 01-.6 1.07z"></path></svg>
            <h1 class="text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400">
                RF Coverage Simulator <span class="text-slate-500 font-medium text-sm ml-1 uppercase tracking-widest">| Pro</span>
            </h1>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 h-full relative">
        
        <aside class="glass-panel w-full md:w-[400px] rounded-xl p-6 flex flex-col gap-5 overflow-y-auto z-10 relative">
            
            <div class="bg-cyan-500/10 border border-cyan-500/20 text-cyan-100/90 p-3.5 rounded-lg text-sm flex items-start gap-3">
                <svg class="w-5 h-5 text-cyan-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p>Fija coordenadas en el mapa, usa un enlace de Maps o delimita una zona con un KML.</p>
            </div>

            <div class="space-y-4">
                <div class="space-y-1.5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Importar de Google Maps</label>
                    <div class="flex gap-2">
                        <input type="text" id="gmaps_url" placeholder="URL larga de Google Maps..." class="w-full px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-lg text-sm text-slate-200 placeholder-slate-500 focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none transition-all">
                        <button onclick="extraerDeMaps()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center justify-center">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Delimitar Zona (KML)</label>
                    <input type="file" id="kml_upload" accept=".kml" class="hidden" onchange="cargarKML(event)">
                    <label for="kml_upload" class="w-full bg-slate-900/50 hover:bg-slate-800 text-slate-300 hover:text-cyan-400 px-4 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center justify-center cursor-pointer border border-slate-600 border-dashed group">
                        <svg class="w-4 h-4 mr-2 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Seleccionar polígono .kml
                    </label>
                </div>
            </div>

            <div class="flex flex-col gap-4 mt-2">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Latitud</label>
                        <input type="number" id="lat" class="w-full px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-lg text-sm text-slate-200 focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none transition-all font-mono">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Longitud</label>
                        <input type="number" id="lon" class="w-full px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-lg text-sm text-slate-200 focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none transition-all font-mono">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Frecuencia (MHz)</label>
                        <input type="number" id="freq" value="868" class="w-full px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-lg text-sm text-slate-200 focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none transition-all font-mono">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Altura Antena (m)</label>
                        <input type="number" id="tx_height" value="3" class="w-full px-4 py-2 bg-slate-900/50 border border-slate-700 rounded-lg text-sm text-slate-200 focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 focus:outline-none transition-all font-mono">
                    </div>
                </div>

                <button id="btnSimular" onclick="realizarSimulacion()" class="mt-1 bg-gradient-to-r from-indigo-600 to-cyan-600 hover:from-indigo-500 hover:to-cyan-500 text-white font-semibold py-3 px-4 rounded-lg glow-hover transition-all duration-300 flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Iniciar Simulación
                </button>
            </div>

            <div id="loader" class="hidden mt-2 flex-col items-center justify-center py-4">
                <svg class="animate-spin -ml-1 mr-3 h-8 w-8 text-cyan-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-[10px] text-cyan-400/80 font-bold animate-pulse uppercase tracking-widest">Procesando modelo ITM...</p>
            </div>

            <div id="historyArea" class="mt-2 flex-1 flex flex-col min-h-0 border-t border-slate-700/50 pt-5">
                <div class="flex justify-between items-end mb-4">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Historial de Análisis</h3>
                    <button onclick="descargarVisibles()" class="text-xs text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 border border-slate-700 px-2.5 py-1.5 rounded transition-colors flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Bajar Visibles
                    </button>
                </div>
                
                <p id="emptyHistoryMsg" class="text-slate-500 text-sm italic text-center mt-4">Ninguna simulación activa.</p>
                
                <div id="simulationList" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-2.5">
                </div>
            </div>

            <div id="admin-tools" class="mt-1 pt-4 border-t border-slate-700/50">
                <button onclick="descargarHtmlParaCliente()" class="w-full bg-slate-800/80 hover:bg-slate-700 text-slate-300 hover:text-white font-medium py-2.5 px-4 rounded-lg border border-slate-600 transition-all text-sm flex items-center justify-center gap-2">
                    <svg class="w-4 h-4 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    Generar Acceso Cliente (2 Usos)
                </button>
            </div>

        </aside>

        <section class="flex-1 bg-slate-900 rounded-xl shadow-2xl relative h-full overflow-hidden border border-slate-800">
            <div id="map"></div>
        </section>
        
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const EMBEDDED_DEMO_TOKEN = ""; 
        const LIMITE_USOS = 2;
        let simulaciones = []; 
        let simCounter = 1;

        if (EMBEDDED_DEMO_TOKEN !== "") {
            document.getElementById('admin-tools').style.display = 'none';
            let usos = parseInt(localStorage.getItem('uso_demo_' + EMBEDDED_DEMO_TOKEN) || '0');
            actualizarBannerCliente(usos);
        }

        function descargarHtmlParaCliente() {
            const tokenCliente = "cliente_" + Math.random().toString(36).substring(2, 10);
            let codigoFuente = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const regexToken = /const\s+EMBEDDED_DEMO_TOKEN\s*=\s*["']["']\s*;/;
            if (!regexToken.test(codigoFuente)) return alert("Error de empaquetado.");
            codigoFuente = codigoFuente.replace(regexToken, `const EMBEDDED_DEMO_TOKEN = "${tokenCliente}";`);
            const blob = new Blob([codigoFuente], { type: 'text/html' });
            const urlDescarga = URL.createObjectURL(blob);
            const linkTemporal = document.createElement('a');
            linkTemporal.href = urlDescarga;
            linkTemporal.download = 'simulador_rf_cliente.html';
            document.body.appendChild(linkTemporal);
            linkTemporal.click();
            document.body.removeChild(linkTemporal);
            URL.revokeObjectURL(urlDescarga);
        }

        function actualizarBannerCliente(usos) {
            const restantes = LIMITE_USOS - usos;
            const banner = document.getElementById('demo-banner');
            const btnSimular = document.getElementById('btnSimular');
            banner.classList.remove('hidden');
            if (restantes > 0) {
                banner.innerHTML = `MODO PRUEBA CLIENTE — QUEDAN ${restantes} SIMULACIONES`;
            } else {
                banner.className = "bg-red-900/80 text-red-300 border-b border-red-500/50 w-full text-center py-2 text-xs font-semibold tracking-wide shadow-md z-20 relative uppercase";
                banner.innerHTML = `LÍMITE DE PRUEBA ALCANZADO. CONTACTE A SU DISTRIBUIDOR.`;
                btnSimular.disabled = true;
                btnSimular.classList.replace('from-indigo-600', 'from-slate-700');
                btnSimular.classList.replace('to-cyan-600', 'to-slate-800');
                btnSimular.classList.replace('hover:from-indigo-500', 'cursor-not-allowed');
                btnSimular.classList.remove('glow-hover');
            }
        }

        const map = L.map('map').setView([39.44, -7.18], 13); // Centrado inicial aproximado cerca de tu KML
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19
        }).addTo(map);

        // CONFIGURACIÓN MAESTRA DEL ICONO NARANJA NEÓN
        const neonOrangeIcon = L.divIcon({
            className: 'neon-orange-pin', 
            html: `
                <svg width="32" height="42" viewBox="0 0 32 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="16" cy="38" rx="8" ry="3" fill="black" fill-opacity="0.3"/>
                    <path d="M16 1C7.71573 1 1 7.71573 1 16C1 26 16 41 16 41C16 41 31 26 31 16C31 7.71573 24.2843 1 16 1Z" fill="white"/>
                    <path d="M16 3C8.8203 3 3 8.8203 3 16C3 24.7 16 38.3 16 38.3C16 38.3 29 24.7 29 16C29 8.8203 23.1797 3 16 3Z" fill="#ff7e00"/>
                    <circle cx="16" cy="16" r="5" fill="white"/>
                </svg>
            `,
            iconSize: [32, 42],
            iconAnchor: [16, 41],
            popupAnchor: [0, -38]
        });

        let inputMarker;
        map.on('click', function(e) { colocarMarcador(e.latlng.lat, e.latlng.lng); });

        function colocarMarcador(lat, lon) {
            const latFixed = parseFloat(lat).toFixed(6);
            const lonFixed = parseFloat(lon).toFixed(6);
            document.getElementById('lat').value = latFixed;
            document.getElementById('lon').value = lonFixed;
            
            if(inputMarker) { map.removeLayer(inputMarker); }
            inputMarker = L.marker([latFixed, lonFixed], { icon: neonOrangeIcon, opacity: 0.9 }).addTo(map);
            map.panTo([latFixed, lonFixed]);
        }

        function extraerDeMaps() {
            const url = document.getElementById('gmaps_url').value;
            if (!url) return;
            let match = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                colocarMarcador(match[1], match[2]);
                document.getElementById('gmaps_url').value = ''; 
            } else {
                alert("No se encontraron coordenadas en el enlace.");
            }
        }

        let capaKMLActual = null;

        function cargarKML(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                procesarKML(e.target.result, file.name);
            };
            reader.readAsText(file);
        }

        function procesarKML(kmlText, fileName) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(kmlText, "text/xml");
            
            let coordinatesList = xmlDoc.getElementsByTagNameNS("*", "coordinates");
            if (coordinatesList.length === 0) {
                coordinatesList = xmlDoc.getElementsByTagName("coordinates");
            }

            if (coordinatesList.length === 0) {
                alert("No se encontraron coordenadas en este archivo KML.");
                return;
            }

            if (capaKMLActual) {
                map.removeLayer(capaKMLActual);
            }

            capaKMLActual = L.featureGroup().addTo(map);
            let boundsGeneral = L.latLngBounds();
            let poligonosEncontrados = 0;

            for (let i = 0; i < coordinatesList.length; i++) {
                const coordsText = coordinatesList[i].textContent;
                const tuples = coordsText.match(/-?\d+(?:\.\d+)?,-?\d+(?:\.\d+)?(?:,-?\d+(?:\.\d+)?)?/g);
                
                if (tuples && tuples.length > 0) {
                    const latLngs = [];
                    tuples.forEach(tuple => {
                        const parts = tuple.split(',');
                        const lon = parseFloat(parts[0]); 
                        const lat = parseFloat(parts[1]);
                        if (!isNaN(lat) && !isNaN(lon)) {
                            latLngs.push([lat, lon]); 
                            boundsGeneral.extend([lat, lon]);
                        }
                    });

                    if (latLngs.length > 2) {
                        const polygon = L.polygon(latLngs, {
                            color: '#ec4899',       
                            weight: 3,              
                            opacity: 1,
                            fillColor: '#ec4899',   
                            fillOpacity: 0.15,      
                            dashArray: '8, 8',
                            interactive: false 
                        });
                        
                        capaKMLActual.addLayer(polygon);
                        poligonosEncontrados++;
                    }
                }
            }

            if (poligonosEncontrados > 0 && boundsGeneral.isValid()) {
                map.fitBounds(boundsGeneral);
            } else {
                alert("No se pudo dbiujar el polígono.");
            }
            document.getElementById('kml_upload').value = ''; 
        }

        function renderizarHistorial() {
            const lista = document.getElementById('simulationList');
            const msg = document.getElementById('emptyHistoryMsg');
            
            if (msg) {
                msg.style.display = simulaciones.length > 0 ? 'none' : 'block';
            }
            
            lista.innerHTML = '';
            
            [...simulaciones].reverse().forEach(sim => {
                const checkedStr = sim.visible ? 'checked' : '';
                const itemHtml = `
                <div class="bg-slate-800/80 p-3 rounded-lg border border-slate-700 shadow-sm flex items-center justify-between gap-3 group hover:border-slate-600 transition-colors">
                    <div class="relative inline-block w-9 mr-1 align-middle select-none">
                        <input type="checkbox" id="toggle_${sim.id}" onchange="toggleCapa(${sim.id}, this.checked)" ${checkedStr} class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-slate-200 border-2 border-slate-600 appearance-none cursor-pointer transition-all duration-300 z-10 top-0.5 left-0.5"/>
                        <label for="toggle_${sim.id}" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-700 cursor-pointer transition-colors duration-300"></label>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-slate-200 truncate" title="${sim.name}">${sim.name}</p>
                        <p class="text-[11px] text-slate-400 font-mono mt-0.5">Frq: ${sim.freq} | Alt: ${sim.alt}m</p>
                    </div>
                    <a href="${sim.kmz}" target="_blank" title="Descargar KMZ" class="bg-slate-700 hover:bg-cyan-600 text-slate-300 hover:text-white p-2 rounded-md transition-colors flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    </a>
                </div>`;
                lista.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        function toggleCapa(id, isVisible) {
            const sim = simulaciones.find(s => s.id === id);
            if (sim && sim.layerGroup) {
                sim.visible = isVisible;
                if (isVisible) {
                    sim.layerGroup.addTo(map);
                } else {
                    map.removeLayer(sim.layerGroup);
                }
            }
        }

        function descargarVisibles() {
            const visibles = simulaciones.filter(s => s.visible);
            if (visibles.length === 0) return alert("Selecciona al menos una simulación visible.");
            
            visibles.forEach((sim, index) => {
                setTimeout(() => {
                    const a = document.createElement('a');
                    a.href = sim.kmz;
                    a.download = '';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }, index * 800); 
            });
        }

        const CLOUDRF_API_KEY = "40959-23f44ca37e5b1a3f4e6bc0fff08857cc7ae92e01";
        
        async function realizarSimulacion() {
            if (EMBEDDED_DEMO_TOKEN !== "") {
                let usos = parseInt(localStorage.getItem('uso_demo_' + EMBEDDED_DEMO_TOKEN) || '0');
                if (usos >= LIMITE_USOS) return; 
            }

            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            const freq = document.getElementById('freq').value;
            const txHeight = document.getElementById('tx_height').value;

            if (!lat || !lon) return alert("Faltan coordenadas. Haz clic en el mapa.");

            document.getElementById('btnSimular').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            try {
                const payload = {
                    site: "Simulador", network: "Demo",
                    transmitter: {
                        lat: parseFloat(lat), lon: parseFloat(lon),
                        alt: parseFloat(txHeight), frq: parseFloat(freq),
                        txw: 0.025, bwi: 0.1              
                    },
                    receiver: { alt: 1, rxg: 1, rxs: -120 },
                    antenna: { txg: 4.3, txl: 1.14, ant: 1, pol: "v" },
                    model: { pm: 1, pe: 3, cli: 1, rel: 80, ked: 1 },
                    environment: { ele: 1, cll: 0, clb: 0 },
                    output: { res: 10, rad: 10, fmt: "kmz", out: 2, col: "LORA.dBm" }
                };

                const response = await fetch('https://api.cloudrf.com/area', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'key': CLOUDRF_API_KEY },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.kmz) {
                    
                    if (EMBEDDED_DEMO_TOKEN !== "") {
                        let usos = parseInt(localStorage.getItem('uso_demo_' + EMBEDDED_DEMO_TOKEN) || '0');
                        usos++;
                        localStorage.setItem('uso_demo_' + EMBEDDED_DEMO_TOKEN, usos);
                        actualizarBannerCliente(usos);
                    }

                    let elementosGrupo = [];
                    
                    // CORREGIDO: Ahora la chincheta definitiva del historial usa EXACTAMENTE tu icono naranja preferido
                    let pinSimulacion = L.marker([parseFloat(lat), parseFloat(lon)], {icon: neonOrangeIcon})
                                         .bindPopup(`<div class="font-sans text-slate-800"><b>Análisis ${simCounter}</b><br><span class="text-slate-500">Freq: ${freq} MHz | Alt: ${txHeight}m</span></div>`);
                    elementosGrupo.push(pinSimulacion);

                    let imageUrl = data.PNG_WGS84 || data.png || data.PNG_Mercator;
                    let boundsLeaflet = null;

                    if (imageUrl && data.bounds) {
                        try {
                            if (Array.isArray(data.bounds[0])) {
                                const b = data.bounds[0];
                                boundsLeaflet = [[b[2], b[3]], [b[0], b[1]]]; 
                            } else {
                                const n = data.bounds[0], e = data.bounds[1], s = data.bounds[2], w = data.bounds[3];
                                boundsLeaflet = [[s, w], [n, e]]; 
                            }
                            let capaColor = L.imageOverlay(imageUrl, boundsLeaflet, { opacity: 0.65 });
                            elementosGrupo.push(capaColor);
                        } catch(err) {
                            console.warn("Fallo leve al procesar la imagen:", err);
                        }
                    }

                    let capaGrupo = L.layerGroup(elementosGrupo).addTo(map);
                    if (boundsLeaflet) {
                        try { map.fitBounds(boundsLeaflet); } catch(e) {}
                    }

                    if(inputMarker) map.removeLayer(inputMarker);

                    simulaciones.push({
                        id: Date.now(),
                        name: `Análisis ${simCounter}`,
                        freq: freq,
                        alt: txHeight,
                        kmz: data.kmz,
                        layerGroup: capaGrupo,
                        visible: true
                    });
                    
                    simCounter++;
                    renderizarHistorial();

                } else {
                    alert("Error en la simulación: " + (data.error || "Revisa la consola."));
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Error de conexión con la API.");
            } finally {
                document.getElementById('btnSimular').classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
